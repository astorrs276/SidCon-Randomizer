<!DOCTYPE html>
<html>
<head>
    <title>SidCon Randomizer</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<script src="scripts/main.js" defer></script>

<body>
    <h1>SidCon Faction Randomizer</h1>
    <div id="test" style="white-space: pre-line"></div>

    <div class="player-count-row">
        <button value="Subtract">-</button>
        <h3 id="player-count">4</h3>
        <button value="Add">+</button>
    </div>

    <button id="advanced-button" value="Advanced">Advanced</button>

    <div class="advanced-settings">
        <div class="adv-line-1">
            <div style="color: #48B24D">Caylion</div>
            <select name="caylion-choice">
                <option value="random">Random</option>
                <option value="include">Include</option>
                <option value="exclude">Exclude</option>
            </select>
            <select name="caylion-choice2" disabled>
                <option value="random">Random</option>
            </select>
        </div>
        <div class="adv-line-2">
            <div style="color: #3A57BD">Eni Et</div>
            <select name="ee-choice">
                <option value="random">Random</option>

                <option value="exclude">Exclude</option>
            </select>
            <select name="ee-choice2" disabled>
                <option value="random">Random</option>
            </select>
        </div>
        <div class="adv-line-3">
            <div style="color: #E8CA2E">Faderan</div>

        <div class="adv-line-4">

        </div>
        <div class="adv-line-5">

                <option value="random">Random</option>
                <option value="include">Include</option>
                <option value="exclude">Exclude</option>
            </select>

            </select>
        </div>
        <div class="adv-line-7">
            <div style="color: #908F8B">Unity</div>
            <select name="unity-choice">
                <option value="random">Random</option>

            </select>
            <select name="unity-choice2" disabled>
                <option value="random">Random</option>
            </select>
        </div>
        <div class="adv-line-8">
            <div style="color: #6D4D91">Yengii</div>
